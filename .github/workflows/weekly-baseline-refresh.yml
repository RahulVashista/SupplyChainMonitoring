name: Weekly baseline refresh

on:
  schedule:
    - cron: "30 3 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Refresh baselines
        run: python collectors/refresh_baselines.py --limit 1000

      - name: Commit baseline updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add baselines/popular_pypi.txt baselines/popular_npm.txt
          git diff --cached --quiet && exit 0
          git commit -m "Refresh popularity baselines"
          git push
